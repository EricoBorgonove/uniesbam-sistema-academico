services:
  postgres:
    image: postgres:16-alpine
    container_name: uniesbam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uniesbam
      POSTGRES_USER: uniesbam
      POSTGRES_PASSWORD: uniesbam123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniesbam -d uniesbam"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    container_name: uniesbam-server
    restart: unless-stopped
    environment:
      PORT: 3333
      DATABASE_URL: postgres://uniesbam:uniesbam123@postgres:5432/uniesbam
      JWT_SECRET: troque-este-segredo-em-producao
      ADMIN_EMAIL: admin@uniesbam.edu.br
      ADMIN_PASSWORD: admin123
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:3333/api
    container_name: uniesbam-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
